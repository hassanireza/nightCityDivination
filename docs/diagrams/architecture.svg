<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Verdana, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06090f"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8c96a"/>
      <stop offset="100%" stop-color="#c8a84b"/>
    </linearGradient>
  </defs>
  <rect width="960" height="560" fill="url(#bg)"/>
  <text x="480" y="42" fill="url(#gold)" font-size="22" font-weight="bold" text-anchor="middle" letter-spacing="2">ARCANA APPLICATION ARCHITECTURE</text>

  <!-- Layer: Data -->
  <rect x="40" y="80" width="200" height="90" rx="6" fill="#0a0e18" stroke="#c8a84b" stroke-opacity="0.5"/>
  <text x="140" y="112" fill="#e8dcc8" font-size="14" text-anchor="middle" font-weight="bold">arcanaSeed.ts</text>
  <text x="140" y="134" fill="#8a94a6" font-size="11" text-anchor="middle">22 card records</text>
  <text x="140" y="150" fill="#8a94a6" font-size="11" text-anchor="middle">(data layer)</text>

  <!-- Layer: Domain models -->
  <rect x="300" y="80" width="360" height="230" rx="6" fill="#0a0e18" stroke="#b44fff" stroke-opacity="0.5"/>
  <text x="480" y="106" fill="#b44fff" font-size="13" text-anchor="middle" font-weight="bold" letter-spacing="1">DOMAIN MODEL LAYER (OOP)</text>

  <rect x="320" y="120" width="150" height="46" rx="4" fill="#111827" stroke="#c8a84b" stroke-opacity="0.4"/>
  <text x="395" y="148" fill="#e8dcc8" font-size="12" text-anchor="middle">ArcanaCard</text>

  <rect x="490" y="120" width="150" height="46" rx="4" fill="#111827" stroke="#c8a84b" stroke-opacity="0.4"/>
  <text x="565" y="148" fill="#e8dcc8" font-size="12" text-anchor="middle">ArcanaDeck</text>

  <rect x="320" y="180" width="150" height="46" rx="4" fill="#111827" stroke="#c8a84b" stroke-opacity="0.4"/>
  <text x="395" y="208" fill="#e8dcc8" font-size="12" text-anchor="middle">ReadingHistory</text>

  <rect x="490" y="180" width="150" height="46" rx="4" fill="#111827" stroke="#c8a84b" stroke-opacity="0.4"/>
  <text x="565" y="208" fill="#e8dcc8" font-size="12" text-anchor="middle">ParticleField</text>

  <rect x="320" y="240" width="320" height="46" rx="4" fill="#111827" stroke="#c8a84b" stroke-opacity="0.4"/>
  <text x="480" y="268" fill="#e8dcc8" font-size="12" text-anchor="middle">RainField (static factory)</text>

  <!-- Layer: Hooks -->
  <rect x="700" y="80" width="220" height="230" rx="6" fill="#0a0e18" stroke="#4488ff" stroke-opacity="0.5"/>
  <text x="810" y="106" fill="#4488ff" font-size="13" text-anchor="middle" font-weight="bold" letter-spacing="1">REACT HOOKS</text>
  <text x="810" y="134" fill="#e8dcc8" font-size="11" text-anchor="middle">useArcanaDeck</text>
  <text x="810" y="156" fill="#e8dcc8" font-size="11" text-anchor="middle">useReadingHistory</text>
  <text x="810" y="178" fill="#e8dcc8" font-size="11" text-anchor="middle">useParticleField</text>
  <text x="810" y="200" fill="#e8dcc8" font-size="11" text-anchor="middle">useFocusTrap</text>
  <text x="810" y="222" fill="#e8dcc8" font-size="11" text-anchor="middle">useScrollReveal</text>
  <text x="810" y="244" fill="#e8dcc8" font-size="11" text-anchor="middle">useTypewriter</text>

  <!-- Layer: Components -->
  <rect x="40" y="360" width="880" height="150" rx="6" fill="#0a0e18" stroke="#c8a84b" stroke-opacity="0.5"/>
  <text x="480" y="386" fill="url(#gold)" font-size="13" text-anchor="middle" font-weight="bold" letter-spacing="1">PRESENTATION LAYER (COMPONENTS)</text>

  <g font-size="11" fill="#e8dcc8" text-anchor="middle">
    <rect x="60" y="400" width="120" height="80" rx="4" fill="#111827" stroke="#333"/>
    <text x="120" y="425">NavBar</text>
    <text x="120" y="445">Hero</text>
    <text x="120" y="465">Footer</text>

    <rect x="200" y="400" width="150" height="80" rx="4" fill="#111827" stroke="#333"/>
    <text x="275" y="425">ArcanaGridSection</text>
    <text x="275" y="445">ArcanaCardTile</text>
    <text x="275" y="465">SectionDivider</text>

    <rect x="370" y="400" width="150" height="80" rx="4" fill="#111827" stroke="#333"/>
    <text x="445" y="425">ReadingModal</text>
    <text x="445" y="445">SpreadModal</text>
    <text x="445" y="465">HistoryDrawer</text>

    <rect x="540" y="400" width="150" height="80" rx="4" fill="#111827" stroke="#333"/>
    <text x="615" y="425">LoreSection</text>
    <text x="615" y="445">BackgroundEffects</text>

    <rect x="710" y="400" width="180" height="80" rx="4" fill="#111827" stroke="#333"/>
    <text x="800" y="425">App.tsx</text>
    <text x="800" y="445">(composition root)</text>
  </g>

  <!-- Arrows -->
  <g stroke="#c8a84b" stroke-opacity="0.6" stroke-width="1.5" fill="none">
    <line x1="240" y1="125" x2="300" y2="125"/>
    <line x1="480" y1="310" x2="480" y2="360"/>
    <line x1="810" y1="310" x2="810" y2="360"/>
  </g>
  <polygon points="296,120 306,125 296,130" fill="#c8a84b"/>
  <polygon points="475,355 480,365 485,355" fill="#c8a84b"/>
  <polygon points="805,355 810,365 815,355" fill="#c8a84b"/>

  <text x="480" y="540" fill="#8a94a6" font-size="11" text-anchor="middle">Data flows down. State and side effects are isolated inside model classes and hooks, keeping components declarative.</text>
</svg>
